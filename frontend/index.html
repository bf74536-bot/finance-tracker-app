<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Calculator</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calculator { width: 90%; max-width: 340px; background: #1e1e1e; padding: 20px; border-radius: 20px; }
        #screen { width: 100%; height: 60px; background: #2d2d2d; border: none; border-radius: 10px; color: #5cf2bd; font-size: 26px; text-align: right; padding: 10px; box-sizing: border-box; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 60px; border-radius: 12px; border: none; background: #333333; color: white; font-size: 20px; font-weight: bold; }
        button.operator { background: #2d5a47; color: #5cf2bd; }
        button.action { background: #a33b3b; }
        button.equal { background: #5cf2bd; color: #121212; grid-column: span 2; }
    </style>
</head>
<body>
<div class="calculator">
    <input type="text" id="screen" readonly placeholder="0">
    <div class="grid">
        <button class="action" onclick="clearScreen()">C</button>
        <button class="operator" onclick="press('/')">/</button>
        <button class="operator" onclick="press('*')">*</button>
        <button class="operator" onclick="press('-')">-</button>
        <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
        <button class="operator" onclick="press('+')">+</button>
        <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
        <button onclick="press('.')">.</button>
        <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
        <button onclick="press('0')">0</button>
        <button class="equal" onclick="sendToBackend()">=</button>
    </div>
</div>
<script>
    let screen = document.getElementById('screen');
    function press(val) { if(screen.value === '0') screen.value = ''; screen.value += val; }
    function clearScreen() { screen.value = ''; }
    async function sendToBackend() {
        try {
            const response = await fetch('http://127.0.0', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ expression: screen.value })
            });
            const data = await response.json();
            screen.value = response.ok ? data.result : "Error";
        } catch (err) { screen.value = "Conn Error"; }
    }
</script>
</body>
</html>
